services:
  web:
    build: ./app
    ports:
      - "5000:5000"
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_NAME=votingdb
      - DB_USER=postgres
      - DB_PASSWORD=password

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=votingdb
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: